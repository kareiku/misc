on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-tables:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - run: sudo apt install -y jq && chmod +x ../scripts/update-tables.bash && ../scripts/update-tables.bash
      - uses: actions/upload-artifact@v3
        with:
          path: tables.md
