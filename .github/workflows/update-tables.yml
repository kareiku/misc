on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-tables:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - run: sudo apt install -y jq && chmod +x ./tables/update-tables.bash && ./tables/update-tables.bash
      - uses: actions/upload-artifact@v3
        with:
          name: tables
          path: tables/
